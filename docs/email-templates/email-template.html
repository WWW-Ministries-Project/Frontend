<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Authentication Email</title>
    <style>
      @media screen and (max-width: 600px) {
        .auth-shell {
          padding: 20px 12px !important;
        }

        .auth-header,
        .auth-body {
          padding-left: 20px !important;
          padding-right: 20px !important;
        }

        .auth-title {
          font-size: 24px !important;
          line-height: 1.25 !important;
        }
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #eef1f8;
      font-family: 'Work Sans', Arial, sans-serif;
      color: #4b5563;
    "
  >
    <!--
      Placeholders for backend templating:
      {{preheader}}, {{productName}}, {{logoUrl}}, {{headerTitle}}, {{headerText}},
      {{greeting}}, {{message}}, {{actionLabel}}, {{actionUrl}}, {{secondaryText}},
      {{supportUrl}}, {{supportLabel}}, {{currentYear}}
    -->
    <div
      style="
        display: none;
        font-size: 1px;
        color: #eef1f8;
        line-height: 1px;
        max-height: 0;
        max-width: 0;
        opacity: 0;
        overflow: hidden;
      "
    >
      {{preheader}}
    </div>

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
      <tr>
        <td class="auth-shell" align="center" style="padding: 32px 16px">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width: 640px">
            <tr>
              <td
                style="
                  border: 1px solid #d8dae5;
                  border-radius: 24px;
                  overflow: hidden;
                  background-color: #ffffff;
                  box-shadow: 0 20px 45px -30px rgba(8, 13, 45, 0.6);
                "
              >
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                  <tr>
                    <td class="auth-header" align="center" style="padding: 24px; background-color: #080d2d; color: #ffffff">
                      <img
                        src="{{logoUrl}}"
                        width="72"
                        alt="{{productName}} logo"
                        style="display: block; margin: 0 auto 14px auto; border: 0; outline: none; text-decoration: none"
                      />
                      <h1
                        class="auth-title"
                        style="
                          margin: 0;
                          font-size: 28px;
                          font-weight: 600;
                          line-height: 1.2;
                          color: #ffffff;
                        "
                      >
                        {{headerTitle}}
                      </h1>
                      <p style="margin: 8px 0 0 0; font-size: 14px; line-height: 1.45; color: rgba(255, 255, 255, 0.9)">
                        {{headerText}}
                      </p>
                    </td>
                  </tr>

                  <tr>
                    <td class="auth-body" style="padding: 28px 32px 30px 32px">
                      <p style="margin: 0 0 12px 0; font-size: 16px; line-height: 1.5; color: #080d2d; font-weight: 600">
                        {{greeting}}
                      </p>
                      <p style="margin: 0 0 24px 0; font-size: 15px; line-height: 1.7; color: #4b5563">
                        {{message}}
                      </p>

                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin: 0 auto 18px auto">
                        <tr>
                          <td align="center" style="background-color: #080d2d; border-radius: 10px">
                            <a
                              href="{{actionUrl}}"
                              target="_blank"
                              rel="noopener noreferrer"
                              style="
                                display: inline-block;
                                padding: 12px 24px;
                                color: #ffffff;
                                font-size: 14px;
                                font-weight: 600;
                                text-decoration: none;
                              "
                            >
                              {{actionLabel}}
                            </a>
                          </td>
                        </tr>
                      </table>

                      <p style="margin: 0 0 10px 0; font-size: 13px; line-height: 1.5; color: #6b7280">
                        {{secondaryText}}
                      </p>
                      <p style="margin: 0 0 22px 0; font-size: 13px; line-height: 1.5; word-break: break-all">
                        <a href="{{actionUrl}}" target="_blank" rel="noopener noreferrer" style="color: #080d2d; text-decoration: underline">
                          {{actionUrl}}
                        </a>
                      </p>

                      <hr style="margin: 0 0 14px 0; border: 0; border-top: 1px solid #e0e3eb" />
                      <p style="margin: 0; font-size: 12px; line-height: 1.6; color: #6b7280">
                        Need help?
                        <a href="{{supportUrl}}" target="_blank" rel="noopener noreferrer" style="color: #080d2d; text-decoration: none">
                          {{supportLabel}}
                        </a>
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 14px 0 0 0; font-size: 12px; line-height: 1.4; color: #6b7280">
                &copy; {{currentYear}} {{productName}}. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
